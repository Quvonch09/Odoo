version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odoo-analytics-api
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4
      -b 0.0.0.0:8000
      --timeout 120
      --keep-alive 30
      --graceful-timeout 30
      --access-logfile -
      --error-logfile -
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - analytics

  redis:
    image: redis:7.4-alpine
    container_name: odoo-analytics-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    networks:
      - analytics

  nginx:
    image: nginx:1.27-alpine
    container_name: odoo-analytics-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - analytics

volumes:
  redis_data:

networks:
  analytics:
    driver: bridge
